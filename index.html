<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Calculator</title>
        <link rel="stylesheet" href="styles.css">
        <meta charset="utf-8">
    </head>
    <body>
        <h1>CALCULATOR</h1>
        <div id="calculator">
            <div>
                <div id="screen"></div>
                <div id="btn-container">
                    <div id="numbers">
                        <button onClick="handleDisplay(1)" class="button">1</button>
                        <button onClick="handleDisplay(1)" class="button">2</button>
                        <button onClick="handleDisplay(1)" class="button">3</button>
                        <button onClick="handleDisplay(1)" class="button">4</button>
                        <button onClick="handleDisplay(1)" class="button">5</button>
                        <button onClick="handleDisplay(1)" class="button">6</button>
                        <button onClick="handleDisplay(1)" class="button">7</button>
                        <button onClick="handleDisplay(1)" class="button">8</button>
                        <button onClick="handleDisplay(1)" class="button">9</button>
                    </div>
                    <div id="operators">
                        <button onClick="handleDisplay(1)" class="subtract button op">-</button>
                        <button onClick="handleDisplay(1)" class="multiply button op">x</button>
                        <button onClick="handleDisplay(1)" class="divide button op">/</button>
                        <button onClick="handleDisplay(1)" class="remainder button op">%</button>
                        <button onClick="handleDisplay(1)" class="exponent button op">^</button>
                        <button onClick="handleDisplay(1)" class="sqrt button op">√</button>
                    </div>
                    <div id="dz">
                        <button onClick="handleDisplay(1)"class="dot button">.</button>
                        <button onClick="handleDisplay(1)" class="button zero">0</button>
                        <button onClick="handleDisplay(1)" class="clear">CLEAR</button>
                        <button onClick="handleDisplay(1)" class="delete button">⌫</button>
                    </div>
                    <div id="others">
                        <button onClick="handleDisplay(1)" class="leftbracket button">(</button>
                        <button onClick="handleDisplay(1)" class="rightbracket button">)</button>
                        <button onClick="handleDisplay(1)" class="result">RESULT</button>
                        <button onClick="handleDisplay(1)" class="add button op">+</button>
                    </div>
                </div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
