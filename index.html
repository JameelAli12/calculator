<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Calculator</title>
        <link rel="stylesheet" href="styles.css">
        <meta charset="utf-8">
    </head>
    <body>
        <h1>CALCULATOR</h1>
        <div id="calculator">
            <div>
                <div id="screen"></div>
                <div id="btn-container">
                    <div id="numbers">
                        <button onClick="handleDisplay(1)" class="button">1</button>
                        <button onClick="handleDisplay(2)" class="button">2</button>
                        <button onClick="handleDisplay(3)" class="button">3</button>
                        <button onClick="handleDisplay(4)" class="button">4</button>
                        <button onClick="handleDisplay(5)" class="button">5</button>
                        <button onClick="handleDisplay(6)" class="button">6</button>
                        <button onClick="handleDisplay(7)" class="button">7</button>
                        <button onClick="handleDisplay(8)" class="button">8</button>
                        <button onClick="handleDisplay(9)" class="button">9</button>
                    </div>
                    <div id="operators">
                        <button onClick="handleDisplay('-')" class="subtract button op">-</button>
                        <button onClick="handleDisplay('*')" class="multiply button op">x</button>
                        <button onClick="handleDisplay('/')" class="divide button op">/</button>
                        <button onClick="handleDisplay('%')" class="remainder button op">%</button>
                        <button onClick="handleDisplay('^')" class="exponent button op">^</button>
                        <button onClick="handleDisplay('√')" class="sqrt button op">√</button>
                    </div>
                    <div id="dz">
                        <button onClick="handleDisplay('.')"class="dot button">.</button>
                        <button onClick="handleDisplay(0)" class="button zero">0</button>
                        <button class="clear">CLEAR</button>
                        <button class="delete button">⌫</button>
                    </div>
                    <div id="others">
                        <button onClick="handleDisplay('(')" class="leftbracket button">(</button>
                        <button onClick="handleDisplay(')')" class="rightbracket button">)</button>
                        <button class="result">RESULT</button>
                        <button onClick="handleDisplay('+')" class="add button op">+</button>
                    </div>
                </div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
